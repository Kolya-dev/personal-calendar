# .golangci.yml
version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
    - gosec
    - misspell

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

output:
  formats:
    text:
      path: stdout
      colors: true
